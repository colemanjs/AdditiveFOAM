/*---------------------------------------------------------------------------*\
  ORNL-characterized nLight AFX-1000 heat source modes

  Values are from the ORNL-characterized AFX beam profiles.

  Units in this file are SI:
      dimensions  [m]
      radius      [m]
      sigma       [m]

  The including heatSourceDict must define depth, innerA, innerB, outerA,
  and outerB before including this file. For example:

      depth   5.0e-5;
      innerA  0.0;
      innerB  1.0;
      outerA  0.0;
      outerB  1.0;

      #include "$ADDITIVEFOAM_ETC/heatSources/nLightAFX-1000.cfg"

  Select a mode inside nLightAFXCoeffs with $Index0 through $Index6.
\*---------------------------------------------------------------------------*/

//  0: D4 = 109.69 um
Index0
{
    dimensions  (5.4845e-5 5.4845e-5 $depth);

    alpha       0.033;

    inner
    {
        radius  1.2840e-5;
        sigma   2.0650e-5;
        A       $innerA;
        B       $innerB;
    }

    outer
    {
        radius  1.0593e-4;
        sigma   1.6620e-5;
        A       $outerA;
        B       $outerB;
    }
}

