Description
    Material configuration for AdditiveFOAM SS316L cases.

Usage
    Include from constant/transportProperties:
        #include "$ADDITIVEFOAM_ETC/materials/SS316L.cfg"

Entries
    kappa       Thermal conductivity Polynomial<3> coefficients [W/m/K].
    Cp          Specific heat Polynomial<3> coefficients [J/kg/K].
    rho         Density [kg/m3].
    mu          Liquid dynamic viscosity [kg/(m s)].
    beta        Thermal expansion coefficient [1/K].
    DAS         Secondary dendrite arm spacing or mushy-zone length scale [m].
    Lf          Latent heat of fusion [J/kg].
    emissivity  Surface emissivity default for mixedTemperature.
    dSigmadT    Surface-tension temperature coefficient default for marangoni
                [N/(m K)].
    thermoPath  Phase-change path as (T alpha.solid).  The path must include
                alpha.solid = 1 and alpha.solid = 0.
\*---------------------------------------------------------------------------*/

solid
{
    kappa   (9.248  0.01571   0.0);
    Cp      (386.7  0.1329    0.0);
}

liquid
{
    kappa   (12.41  0.003279  0.0);
    Cp      (770.4  0.0       0.0);
}

powder
{
    kappa   (9.248  0.01571   0.0);
    Cp      (386.7  0.1329    0.0);
}

rho     [1 -3 0 0 0 0 0]    7955;
mu      [1 -1 -1 0 0 0 0]   0.002188;
beta    [0 0 0 -1 0 0 0]    3.101e-05;
DAS     [0 1 0 0 0 0 0]     10e-6;
Lf      [0 2 -2 0 0 0 0]    2.68e+05;

emissivity  0.4;
dSigmadT    -0.36e-3;

thermoPath
(
    (1471 1)
    (1709 0)
);

